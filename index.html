<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Kode Keras Buat Balikan</title>

<style>

/* ===== GLOBAL ===== */
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url('bg-intro.jpg') center/cover no-repeat;
}

/* ===== ROTATE LOCK ===== */
#rotateLock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:9999;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-size:18px;
}

/* ===== CONTAINER ===== */
.container{
display:flex;
align-items:center;
justify-content:center;
height:100%;
padding:20px;
}

/* ===== BOX ===== */
.box{
display:flex;
gap:25px;
align-items:center;

background:rgba(0,0,0,0.6);
padding:20px;
border-radius:20px;

max-width:800px;
width:100%;
}

/* ===== IMAGE ===== */
.box img{
width:40%;
max-width:260px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* ===== TEXT ===== */
.content{
flex:1;
}

h1{
margin:0 0 10px;
font-size:28px;
}

p{
font-size:15px;
opacity:0.9;
line-height:1.5;
}

/* ===== BUTTON ===== */
button{
margin-top:20px;
padding:14px;
width:100%;
font-size:16px;
border:none;
border-radius:15px;

background:#4da6ff;
color:white;
font-weight:bold;
}

button:active{
transform:scale(0.97);
}

</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="rotateLock">
📱<br><br>
Kupa : Putar HP lu tod!!<br>
Ini ga support Potrait!!!
</div>

<!-- CONTENT -->
<div class="container">
<div class="box">

<img src="Intro.png">

<div class="content">
<h1>Kode Keras Buat Balikan</h1>

<p>
Bantu Kupa di game ini agar dia tidak putus dengan Baby Girl nya 
dengan memilih opsi yang tepat untuk membantu Kupa menjawab 
pertanyaan dari baby girl nya!!!
</p>

<button onclick="startGame()">AYO MAIN CUKK!</button>
</div>

</div>
</div>

<script>

/* ===== FORCE LANDSCAPE ===== */
const lock = document.getElementById("rotateLock")

function check(){
if(window.innerHeight > window.innerWidth){
lock.style.display = "flex"
}else{
lock.style.display = "none"
}
}

// run terus biar ga bisa kabur
setInterval(check,300)
window.addEventListener("resize",check)
window.addEventListener("load",check)

/* ===== START GAME ===== */
function startGame(){
window.location.href = "kupa.html"
}

</script>

</body>
</html>
