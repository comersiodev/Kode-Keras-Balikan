<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>KKBB FINAL PERFECT</title>

<style>

/* ===== GLOBAL ===== */
html,body{
margin:0;
height:100vh;
overflow:hidden;
touch-action:none;
font-family:Arial;
background:url('background.jpg') center/cover;
}

/* ===== ROTATE LOCK ===== */
#forceRotate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
}

/* ===== WRAPPER ===== */
.wrapper{
display:flex;
flex-direction:column;
height:100vh;
}

/* ===== SCORE ===== */
#scoreBoard{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:white;
padding:8px 16px;
border-radius:20px;
z-index:10;
}

/* ===== CHAR AREA ===== */
.characters{
height:45%;
display:flex;
justify-content:space-between;
align-items:flex-end;
padding:0 6vw;
}

.char{
width:28vw;
max-width:180px;
aspect-ratio:1/1;
background-repeat:no-repeat;
background-size:400% 400%;
background-position:center bottom;
}

/* ===== CHAT ===== */
.chat{
height:55%;
background:#f1f1f1;
padding:12px;
display:flex;
flex-direction:column;
}

#chat{ flex:1; }

button{
width:100%;
margin-top:6px;
padding:10px;
border:none;
border-radius:10px;
}

/* ===== END ===== */
.endScreen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url('background.jpg') center/cover;
}

.kupaEnd{
width:40vw;
max-width:220px;
aspect-ratio:1/1;
background:url('Kupa.png') no-repeat;
background-size:400% 400%;
margin-bottom:15px;
}

</style>
</head>

<body>

<div id="forceRotate">Putar HP lu ke samping 🗿</div>

<audio id="bgm" src="music.mp3" loop></audio>
<audio id="notif" src="notif.mp3"></audio>
<audio id="call" src="calling.mp3"></audio>

<div class="wrapper">

<div id="scoreBoard">Score: <span id="scoreText">50</span></div>

<div class="characters">
<div id="kupaImg" class="char"></div>
<div id="liaImg" class="char"></div>
</div>

<div class="chat">
<div id="name"></div>
<div id="chat"></div>
<div id="choices"></div>
<button id="nextBtn">NEXT</button>
</div>

</div>

<script>

/* ===== ROTATE ===== */
const lock = document.getElementById("forceRotate");

function checkOrientation(){
if(window.innerHeight > window.innerWidth){
lock.style.display="flex";
lock.style.pointerEvents="auto";
}else{
lock.style.display="none";
lock.style.pointerEvents="none";
}
}

setInterval(checkOrientation,300);

/* ===== AUDIO ===== */
const bgm=document.getElementById("bgm");
const notif=document.getElementById("notif");
const call=document.getElementById("call");

let started=false;
document.addEventListener("click",()=>{
if(started) return;
started=true;
bgm.volume=0.4;
bgm.play().catch(()=>{});
});

function play(a){
a.currentTime=0;
a.play().catch(()=>{});
}

/* ===== ELEMENT ===== */
const kupaImg=document.getElementById("kupaImg");
const liaImg=document.getElementById("liaImg");
const chat=document.getElementById("chat");
const nameEl=document.getElementById("name");
const choices=document.getElementById("choices");
const nextBtn=document.getElementById("nextBtn");
const scoreText=document.getElementById("scoreText");

/* ===== SCORE ===== */
let score=50;

function applyScore(type){
if(type==="good") score+=10;
else if(type==="mid") score+=3;
else score-=10;

score=Math.max(0,Math.min(100,score));
scoreText.innerText=score;
}

/* ===== SPRITE ===== */
kupaImg.style.backgroundImage="url(Kupa.png)";
liaImg.style.backgroundImage="url(Lia.png)";

function setExp(el,x,y){
el.style.backgroundPosition=`${(x/3)*100}% ${(y/3)*100}%`;
}

setExp(kupaImg,0,0);
setExp(liaImg,0,0);

/* ===== ENGINE ===== */
let current=0, sub=0, mode="dialog"
let callPlayed=false
const scenes = [

{
dialog:[
{speaker:"Lia",text:"Kupa...",kupa:[0,0],lia:[2,3]},
{speaker:"Lia",text:"Lu masih nyaman sama gua?",kupa:[0,0],lia:[2,3]},
{speaker:"Kupa",text:"Pertanyaan lu aneh",kupa:[1,0],lia:[2,3]},
{speaker:"Lia",text:"Aneh gimana?",kupa:[1,0],lia:[2,1]}
],
choices:[
{text:"Aneh karena lu tiba-tiba berubah",type:"good",next:1},
{text:"Ya random aja nanya gitu",type:"mid",next:2},
{text:"Lu kenapa sih?",type:"bad",next:99}
]
},

// ===== EMOTIONAL PROBE =====
{
dialog:[
{speaker:"Lia",text:"Jadi sekarang gua yang berubah?",kupa:[0,0],lia:[2,1]},
{speaker:"Kupa",text:"Gua ngerasa ada jarak aja",kupa:[1,0],lia:[2,1]}
],
choices:[
{text:"Bukan lu doang, gua juga ngerasain",type:"good",next:3},
{text:"Ya emang berubah kan",type:"bad",next:98},
{text:"Mungkin cuma perasaan",type:"mid",next:2}
]
},

{
dialog:[
{speaker:"Lia",text:"Lu tuh sekarang beda cara responnya",kupa:[0,0],lia:[1,1]},
{speaker:"Lia",text:"Kayak ga se-effort dulu",kupa:[0,0],lia:[1,1]}
],
choices:[
{text:"Effort gua beda, bukan hilang",type:"good",next:3},
{text:"Lu aja yang ngerasa",type:"bad",next:98},
{text:"Gua lagi capek aja",type:"mid",next:4}
]
},

// ===== TRUST TEST =====
{
dialog:[
{speaker:"Lia",text:"Lu jujur ya...",kupa:[0,0],lia:[2,0]},
{speaker:"Lia",text:"Lu ada yang lain?",kupa:[0,0],lia:[2,0]},
{speaker:"Kupa",text:"Lu denger dari siapa?",kupa:[2,0],lia:[2,0]}
],
choices:[
{text:"Lu mau percaya orang atau gua?",type:"good",next:5},
{text:"Cuma temen",type:"mid",next:5},
{text:"Lu nuduh?",type:"bad",next:97}
]
},

// ===== CALL MOMENT =====
{
dialog:[
{speaker:"Lia",text:"Gua ga suka bahas ini lewat chat",kupa:[0,0],lia:[2,2]},
{speaker:"Lia",text:"📞 Calling...",kupa:[0,0],lia:[2,2]},
{speaker:"Kupa",text:"Angkat.",kupa:[2,2],lia:[2,2]}
],
choices:[
{text:"Gua dengerin lu",type:"good",next:6},
{text:"Ngapain sih harus call",type:"bad",next:96},
{text:"Yaudah ngomong aja",type:"mid",next:6}
]
},

// ===== CALL PRESSURE =====
{
dialog:[
{speaker:"Lia",text:"Suara lu beda",kupa:[2,2],lia:[1,3]},
{speaker:"Lia",text:"Kayak ga peduli",kupa:[2,2],lia:[1,3]},
{speaker:"Kupa",text:"Gua lagi nyoba tenang",kupa:[1,0],lia:[1,3]}
],
choices:[
{text:"Biar gua ga salah respon ke lu",type:"good",next:7},
{text:"Lu terlalu sensitif",type:"bad",next:96},
{text:"Gua juga bingung",type:"mid",next:7}
]
},

// ===== FINAL TRAP =====
{
dialog:[
{speaker:"Lia",text:"Kalo gua pergi sekarang?",kupa:[0,0],lia:[2,3]},
{speaker:"Kupa",text:"...",kupa:[3,0],lia:[2,3]}
],
choices:[
{text:"Gua tahan, tapi bukan maksa",type:"good",next:8},
{text:"Yaudah kalo itu maunya",type:"bad",next:96},
{text:"Gua ga bisa nahan orang",type:"mid",next:9}
]
},

// ===== TRUE END =====
{
dialog:[
{speaker:"Lia",text:"Lu aneh sih...",kupa:[0,0],lia:[3,1]},
{speaker:"Lia",text:"Tapi ga ninggalin",kupa:[0,0],lia:[3,1]},
{speaker:"END",text:"Lu berhasil 🤍"}
],
choices:[]
},

// ===== MID =====
{
dialog:[
{speaker:"Lia",text:"Gua masih ragu",kupa:[0,0],lia:[2,3]},
{speaker:"END",text:"Masih gantung…"}
],
choices:[]
},

// ===== BAD =====
{ id:96, dialog:[{speaker:"END",text:"Dia pergi 💀"}], choices:[] },
{ id:97, dialog:[{speaker:"END",text:"Ilfeel 🗿"}], choices:[] },
{ id:98, dialog:[{speaker:"END",text:"Retak 💔"}], choices:[] },
{ id:99, dialog:[{speaker:"END",text:"Game over 😭"}], choices:[] }

]

function getScene(id){
return scenes.find(s=>s.id===id) || scenes[id];
}

function render(){

let s=getScene(current)
if(!s) return

if(!s.choices || s.choices.length===0){
endGame()
return
}

if(mode==="dialog"){

choices.innerHTML=""
nextBtn.style.display="block"

let line=s.dialog[sub]

nameEl.innerText=line.speaker
chat.innerText=line.text

play(notif)

// CALL ONCE
if(line.text.includes("📞") && !callPlayed){
play(call)
callPlayed=true
}

// SPRITE
if(line.kupa) setExp(kupaImg,...line.kupa)
if(line.lia) setExp(liaImg,...line.lia)

// NEXT
nextBtn.onclick=()=>{
if(sub<s.dialog.length-1){
sub++
}else{
mode="choice"
}
render()
}

}else{

nextBtn.style.display="none"
choices.innerHTML=""

// RESET CALL
callPlayed=false

s.choices.forEach(c=>{
let btn=document.createElement("button")
btn.innerText=c.text

btn.onclick=()=>{
applyScore(c.type)
current=c.next
sub=0
mode="dialog"
render()
}

choices.appendChild(btn)
})
}
}

/* ===== END ===== */
function endGame(){

let status = score<40?"Lu kehilangan dia 💀":
score<70?"Masih gantung…":"Lu berhasil 🤍";

document.body.innerHTML=`
<div class="endScreen">
<div id="kupaEnd" class="kupaEnd"></div>
<h2>Score: ${score}</h2>
<p>${status}</p>
<button onclick="location.reload()">RESTART</button>
</div>
`

let k=document.getElementById("kupaEnd")
let exp = score<40?[2,1]:score<70?[0,1]:[3,1]
k.style.backgroundPosition=`${(exp[0]/3)*100}% ${(exp[1]/3)*100}%`
}

/* ===== START ===== */
render()

</script>

</body>
</html>
